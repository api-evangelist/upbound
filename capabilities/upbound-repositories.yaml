    resources:
    - name: organizations-orgName-repositories
      path: /organizations/{orgName}/repositories
      operations:
      - name: listrepositories
        method: GET
        description: List Repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgName
          in: path
          type: string
          required: true
        - name: page
          in: query
          type: integer
        - name: size
          in: query
          type: integer
      - name: createrepository
        method: POST
        description: Create Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgName
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: organizations-orgName-repositories-repoName
      path: /organizations/{orgName}/repositories/{repoName}
      operations:
      - name: getrepository
        method: GET
        description: Get Repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgName
          in: path
          type: string
          required: true
        - name: repoName
          in: path
          type: string
          required: true
      - name: deleterepository
