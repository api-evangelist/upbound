        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgName
          in: path
          type: string
          required: true
        - name: repoName
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.UPBOUND_API_KEY}}'
  exposes:
  - type: rest
    namespace: upbound-repositories-rest
    port: 8080
    description: REST adapter for Upbound API — Repositories. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/organizations/{orgname}/repositories
      name: organizations-orgname-repositories
      description: REST surface for organizations-orgName-repositories.
      operations:
      - method: GET
        name: listrepositories
        description: List Repositories
        call: upbound-repositories.listrepositories
        with:
          orgName: rest.orgName
          page: rest.page
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
