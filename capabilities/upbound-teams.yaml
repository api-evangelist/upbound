naftiko: 1.0.0-alpha2
info:
  label: Upbound API — Teams
  description: 'Upbound API — Teams. 4 operations. Lead operation: List Teams. Self-contained Naftiko capability covering
    one Upbound business surface.'
  tags:
  - Upbound
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UPBOUND_API_KEY: UPBOUND_API_KEY
capability:
  consumes:
  - type: http
    namespace: upbound-teams
    baseUri: https://api.upbound.io/v1
    description: Upbound API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: organizations-orgName-teams
      path: /organizations/{orgName}/teams
      operations:
      - name: listteams
        method: GET
        description: List Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgName
          in: path
          type: string
          required: true
        - name: page
          in: query
          type: integer
        - name: size
          in: query
          type: integer
      - name: createteam
        method: POST
        description: Create Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgName
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: organizations-orgName-teams-teamName
      path: /organizations/{orgName}/teams/{teamName}
      operations:
      - name: getteam
        method: GET
        description: Get Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgName
          in: path
          type: string
          required: true
        - name: teamName
          in: path
          type: string
          required: true
      - name: deleteteam
        method: DELETE
        description: Delete Team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgName
          in: path
          type: string
          required: true
        - name: teamName
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.UPBOUND_API_KEY}}'
  exposes:
  - type: rest
    namespace: upbound-teams-rest
    port: 8080
    description: REST adapter for Upbound API — Teams. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/organizations/{orgname}/teams
      name: organizations-orgname-teams
      description: REST surface for organizations-orgName-teams.
      operations:
      - method: GET
        name: listteams
        description: List Teams
        call: upbound-teams.listteams
        with:
          orgName: rest.orgName
          page: rest.page
          size: rest.size
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createteam
        description: Create Team
        call: upbound-teams.createteam
        with:
          orgName: rest.orgName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{orgname}/teams/{teamname}
      name: organizations-orgname-teams-teamname
      description: REST surface for organizations-orgName-teams-teamName.
      operations:
      - method: GET
        name: getteam
        description: Get Team
        call: upbound-teams.getteam
        with:
          orgName: rest.orgName
          teamName: rest.teamName
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteteam
        description: Delete Team
        call: upbound-teams.deleteteam
        with:
          orgName: rest.orgName
          teamName: rest.teamName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: upbound-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Upbound API — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-teams
      description: List Teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: upbound-teams.listteams
      with:
        orgName: tools.orgName
        page: tools.page
        size: tools.size
      outputParameters:
      - type: object
        mapping: $.
    - name: create-team
      description: Create Team
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: upbound-teams.createteam
      with:
        orgName: tools.orgName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-team
      description: Get Team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: upbound-teams.getteam
      with:
        orgName: tools.orgName
        teamName: tools.teamName
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-team
      description: Delete Team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: upbound-teams.deleteteam
      with:
        orgName: tools.orgName
        teamName: tools.teamName
      outputParameters:
      - type: object
        mapping: $.
